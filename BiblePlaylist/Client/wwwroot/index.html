<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bible Playlist</title>
    <base href="/" />
    <link href="BiblePlaylist.Client.styles.css" rel="stylesheet" />
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css?v=11" rel="stylesheet" />
    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            const randomVersion = Math.floor(Math.random() * 10000) + 1;

            let bodyScript = document.createElement('script');

            bodyScript.src = 'js/audioplayer.js?v=' + randomVersion;

            document.body.appendChild(bodyScript);

            if (window.matchMedia("only screen and (max-width: 760px)").matches) {
                let erudaScript = document.createElement('script');

                erudaScript.src = 'https://cdn.jsdelivr.net/npm/eruda';
                document.body.appendChild(erudaScript);
                erudaScript.onload = function () {
                    eruda.init();
                };
            }
        });
    </script>    
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>    
    <script>navigator.serviceWorker.register('service-worker.js');</script>

</body>

</html>
