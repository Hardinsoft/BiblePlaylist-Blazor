name: CI

on:
  push:
    branches: [ main, 'releases/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ '9.0.x', '10.0.x' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Setup Node (for Blazor WASM tooling)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: |
          # Run all test projects; dotnet test will discover test projects automatically
          dotnet test --configuration Release --no-build --verbosity minimal
